name: Branch Flow Guard

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - edited
      - ready_for_review

permissions:
  contents: read

jobs:
  validate-branch-flow:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR source/target branches
        shell: bash
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail

          echo "Base: ${BASE_REF}"
          echo "Head: ${HEAD_REF}"
          echo "Title: ${PR_TITLE}"

          fail() {
            echo "::error::$1"
            exit 1
          }

          allowed="false"

          if [[ "${BASE_REF}" == "main" ]]; then
            if [[ "${HEAD_REF}" =~ ^feature/ ]] \
              || [[ "${HEAD_REF}" =~ ^refactor/ ]] \
              || [[ "${HEAD_REF}" =~ ^perf/ ]] \
              || [[ "${HEAD_REF}" =~ ^chore/ ]] \
              || [[ "${HEAD_REF}" =~ ^fix/ ]] \
              || [[ "${HEAD_REF}" =~ ^docs/ ]] \
              || [[ "${HEAD_REF}" =~ ^hotfix/ ]] \
              || [[ "${HEAD_REF}" =~ ^dependabot/ ]]; then
              allowed="true"
            fi
          fi

          if [[ "${allowed}" != "true" ]]; then
            fail "Invalid branch flow: '${HEAD_REF}' -> '${BASE_REF}'. Expected main-only flow. See docs/branching-policy.md"
          fi

          if [[ "${HEAD_REF}" =~ ^hotfix/ ]] && [[ "${BASE_REF}" == "main" ]]; then
            if [[ ! "${PR_TITLE}" =~ [Ee][Mm][Ee][Rr][Gg][Ee][Nn][Cc][Yy] ]] \
              && [[ ! "${PR_TITLE}" =~ [Pp]0 ]] \
              && [[ ! "${PR_BODY}" =~ [Ee][Mm][Ee][Rr][Gg][Ee][Nn][Cc][Yy] ]] \
              && [[ ! "${PR_BODY}" =~ [Pp]0 ]]; then
              fail "Emergency hotfix PR must include 'EMERGENCY' or 'P0' in title/body."
            fi
          fi

          echo "Branch flow policy passed."
