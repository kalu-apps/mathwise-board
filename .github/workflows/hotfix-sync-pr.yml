name: Auto Sync Main To Next After Hotfix

on:
  pull_request:
    types:
      - closed

permissions:
  contents: read
  pull-requests: write

jobs:
  open-sync-pr:
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      startsWith(github.event.pull_request.head.ref, 'hotfix/')
    runs-on: ubuntu-latest
    steps:
      - name: Create or reuse sync PR main -> next
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sourcePr = context.payload.pull_request;

            const existing = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              base: 'next',
              head: `${owner}:main`,
              per_page: 100,
            });

            if (existing.length > 0) {
              core.info(`Sync PR already exists: ${existing[0].html_url}`);
              return;
            }

            const title = `sync: main -> next after ${sourcePr.head.ref}`;
            const body = [
              'Auto-created after emergency hotfix merge into `main`.',
              '',
              `Source hotfix PR: ${sourcePr.html_url}`,
              '',
              'Please review and merge to keep `next` aligned with production state.',
            ].join('\n');

            try {
              const created = await github.rest.pulls.create({
                owner,
                repo,
                title,
                head: 'main',
                base: 'next',
                body,
                maintainer_can_modify: true,
              });
              core.info(`Created sync PR: ${created.data.html_url}`);
            } catch (error) {
              const message = String(error && error.message ? error.message : error);
              if (message.includes('No commits between')) {
                core.info('No commits between main and next. Sync PR not needed.');
                return;
              }
              throw error;
            }
