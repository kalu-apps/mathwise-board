name: Quality Gates

on:
  pull_request:
    branches:
      - next
      - main

permissions:
  contents: read

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify project
        run: npm run verify

      - name: Verify phase-0 artifacts
        run: npm run phase0:verify

