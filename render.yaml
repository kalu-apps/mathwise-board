services:
  - type: web
    name: math-realtime-lesson-demo
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build:showcase
    startCommand: npm run start:showcase
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: VITE_SHOWCASE_MODE
        value: realtime
      - key: VITE_WHITEBOARD_ONLY
        value: "1"
      - key: VITE_WHITEBOARD_TEACHER_LOGIN
        sync: false
      - key: VITE_WHITEBOARD_STUDENT_LOGIN
        sync: false
      - key: VITE_WHITEBOARD_DEMO_PASSWORD
        sync: false
